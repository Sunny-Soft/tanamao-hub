<div class="glass-card">
  <h3 class="text-xl font-bold mb-6">Downloads & Atualizações</h3>

  <div class="space-y-6">
    <div *ngFor="let p of (programs$ | async)" class="p-4 rounded-xl bg-slate-50 border border-slate-200">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-blue-50 flex items-center justify-center text-blue-600">
            <span class="material-icons-outlined text-xl">{{ p.icon }}</span>
          </div>
          <div>
            <div class="font-bold">{{ p.name }}</div>
            <div class="text-xs text-slate-500">{{ p.message || (p.status === 'updating' ? 'Atualizando...' : (p.status ===
              'downloading' ? 'Baixando...' : 'Aguardando')) }}</div>
          </div>
        </div>
        <div class="text-right">
          <span class="text-sm font-bold text-blue-600">{{ p.progress || 0 }}%</span>
        </div>
      </div>

      <div class="w-full bg-slate-200 rounded-full h-2 overflow-hidden">
        <div class="bg-gradient-to-r from-blue-600 to-blue-400 h-full transition-all duration-500"
          [style.width.%]="p.progress || 0"></div>
      </div>
    </div>

    <div *ngIf="!(hasActiveTask$ | async)" class="py-12 text-center text-slate-400">
      <span class="material-icons-outlined text-4xl mb-2">cloud_done</span>
      <p>Nenhum download ou atualização ativa no momento.</p>
    </div>
  </div>
</div>
