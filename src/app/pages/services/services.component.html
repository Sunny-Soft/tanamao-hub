<div class="space-y-6">
    <header>
        <h2 class="text-3xl font-bold">Serviços</h2>
        <p class="text-slate-500">Gerencie os serviços auxiliares do sistema.</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6" *ngIf="postgres$ | async as pg">
        <div class="glass-card p-6 card">
            <div class="flex items-start justify-between mb-6">
                <div class="flex items-center gap-4">
                    <div
                        class="w-12 h-12 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 flex align-center justify-center">
                        <span class="material-icons-outlined">database</span>
                    </div>
                    <div>
                        <h3 class="text-xl font-bold">PostgreSQL</h3>
                        <p class="text-slate-500 text-sm">Banco de dados principal</p>
                    </div>
                </div>
                <div
                    [class]="pg.isRunning ? 'px-3 py-1 bg-green-100 text-green-600 text-xs font-bold uppercase rounded-full border border-green-200' : 'px-3 py-1 bg-slate-100 text-slate-500 text-xs font-bold uppercase rounded-full border border-slate-200'">
                    {{ pg.isRunning ? 'Rodando' : 'Parado' }}
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex items-center justify-between text-sm py-2 border-b border-slate-50">
                    <span class="text-slate-400">Versão</span>
                    <span class="font-medium font-mono">{{ pg.version || '---' }}</span>
                </div>
                <div class="flex items-center justify-between text-sm py-2 border-b border-slate-50">
                    <span class="text-slate-400">Porta</span>
                    <span class="font-medium font-mono">5433</span>
                </div>
            </div>

            <div class="mt-8 flex gap-3">
                <button (click)="togglePostgres()"
                    [class]="pg.isRunning ? 'btn-secondary flex-1 flex items-center justify-center gap-2' : 'btn-primary flex-1 flex items-center justify-center gap-2'">
                    <span class="material-icons-outlined text-sm">{{ pg.isRunning ? 'stop' : 'play_arrow' }}</span>
                    {{ pg.isRunning ? 'Parar Serviço' : 'Iniciar Serviço' }}
                </button>
            </div>
        </div>
    </div>

    <div class="p-8 text-center glass-card border-dashed" *ngIf="!(postgres$ | async)">
        <span class="material-icons-outlined text-4xl text-slate-300 mb-2">info</span>
        <p class="text-slate-500 font-medium">Nenhum serviço detectado ou instalado.</p>
    </div>
</div>
